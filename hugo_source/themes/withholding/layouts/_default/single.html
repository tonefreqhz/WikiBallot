{{ define "main" }}
<article class="page-article">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="page-subtitle">{{ . }}</p>{{ end }}
    {{ with .Date }}<time class="page-date">{{ .Format "2 January 2006" }}</time>{{ end }}
  </header>
  <div class="page-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
